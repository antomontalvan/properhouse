<nav [class.scrolled]="isScrolled">

			alt="Proper House Barber" 
			class="navbar-logo navbar-logo-full"

		<img 
			src="images/logoBlanco.png"
			alt="Proper House Barber"
			class="navbar-logo navbar-logo-icon"
