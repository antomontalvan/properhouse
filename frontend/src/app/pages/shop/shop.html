<app-navbar-shop></app-navbar-shop> <!-- Navbar -->

<!-- Seccion Hero -->
<section class="shop-hero">
  
  <div class= "hero-overlay"></div>  

  <div class= "hero-content">
    <p class= "hero-subtitle">
      COLECCIÓN 2026
    </p>

    <h1 class="hero-title">
      LA TIENDA
    </h1>

    <p class="hero-description">
      Productos de cuidado y estilo seleccionados para acompañar tu rutina diaria.
      Calidad profesional, diseño y carácter en cada detalle.
    </p>
  </div>
</section>

<!-- Mini Navbar de Categorias de Productos. -->
<app-category-filter
  (categoryChanged)="onCategoryChange($event)">
</app-category-filter>

<!-- Grid de productos -->
<app-products-grid
  [products] = "filteredProducts"
></app-products-grid>
